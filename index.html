<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mes Musiques</title>
</head>
<body>
    <h1>Mes Musiques</h1>
    <div id="list"></div>

    <script>
        const LIST_URL = "https://TON_BACKEND.infinityfreeapp.com/list.php";

        fetch(LIST_URL)
            .then(r => r.json())
            .then(files => {
                const container = document.getElementById("list");
                files.forEach(f => {
                    const audio = document.createElement("audio");
                    audio.controls = true;
                    audio.src = "https://TON_BACKEND.infinityfreeapp.com/musics/" + f;
                    container.appendChild(audio);
                    container.appendChild(document.createElement("br"));
                });
            });
    </script>
</body>
</html>
