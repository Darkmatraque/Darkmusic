<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Darkmusic – Musiques</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Darkmusic</h1>
    <p>Écoute mes sons directement ici</p>
</header>

<div id="music-list" class="music-container"></div>

<!-- CANVAS LASERS -->
<canvas id="lasers"></canvas>

<!-- VISUALIZER -->
<canvas id="visualizer"></canvas>

<script>
/* ------------------ CHARGEMENT DES MUSIQUES ------------------ */

const LIST_URL = "http://darkmusic.xo.je/list.php";

fetch(LIST_URL)
    .then(r => r.json())
    .then(files => {
        const container = document.getElementById("music-list");

        files.forEach(f => {
            const card = document.createElement("div");
            card.className = "music-card";

            card.innerHTML = `
                <div class="music-title">${f}</div>
                <audio controls src="http://darkmusic.xo.je/musics/${f}"></audio>
            `;

            container.appendChild(card);
        });
    })
    .catch(() => {
        document.getElementById("music-list").innerHTML =
            "<p style='text-align:center;color:#f55'>Impossible de charger les musiques.</p>";
    });
</script>

<script>
/* ------------------ LASERS FESTIVAL ------------------ */

const canvas = document.getElementById("lasers");
const ctx = canvas.getContext("2d");

function resizeLasers() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeLasers();
window.addEventListener("resize", resizeLasers);

const LASERS_LEFT = 6;
const LASERS_RIGHT = 6;

function randomColor() {
    const colors = [
        "rgba(255, 0, 80, 0.8)",
        "rgba(0, 180, 255, 0.8)",
        "rgba(180, 0, 255, 0.8)",
        "rgba(0, 255, 160, 0.8)",
        "rgba(255, 120, 0, 0.8)"
    ];
    return colors[Math.floor(Math.random() * colors.length)];
}

function createLaser(side) {
    return {
        side,
        angle: -Math.PI / 2 + (Math.random() * 0.4 - 0.2),
        speed: 0.003 + Math.random() * 0.01,
        width: 2 + Math.random() * 4,
        color: randomColor()
    };
}

let lasers = [];

for (let i = 0; i < LASERS_LEFT; i++) lasers.push(createLaser("left"));
for (let i = 0; i < LASERS_RIGHT; i++) lasers.push(createLaser("right"));

function animateLasers() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    lasers.forEach(l => {
        l.angle += (Math.random() * 0.004 - 0.002);

        let xStart = (l.side === "left") ? 0 : canvas.width;
        let yStart = canvas.height;

        const xEnd = xStart + Math.cos(l.angle) * 2000;
        const yEnd = yStart + Math.sin(l.angle) * 2000;

        ctx.strokeStyle = l.color;
        ctx.lineWidth = l.width;

        ctx.shadowBlur = 35;
        ctx.shadowColor = l.color;

        ctx.beginPath();
        ctx.moveTo(xStart, yStart);
        ctx.lineTo(xEnd, yEnd);
        ctx.stroke();
    });

    requestAnimationFrame(animateLasers);
}
animateLasers();
</script>

<script>
/* ------------------ VISUALIZER AUDIO ------------------ */

const vis = document.getElementById("visualizer");
const vctx = vis.getContext("2d");

function resizeVis() {
    vis.width = window.innerWidth;
    vis.height = 150;
}
resizeVis();
window.addEventListener("resize", resizeVis);

let audioCtx;
let analyser;
let source;

function setupVisualizer(audio) {
    if (!audioCtx) {
        audioCtx = new AudioContext();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 128;
    }

    if (source) source.disconnect();

    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
}

function drawVis() {
    requestAnimationFrame(drawVis);

    if (!analyser) return;

    const buffer = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(buffer);

    vctx.clearRect(0, 0, vis.width, vis.height);

    const barWidth = vis.width / buffer.length;

    for (let i = 0; i < buffer.length; i++) {
        const barHeight = buffer[i] * 1.2;
        const x = i * barWidth;

        vctx.fillStyle = `hsl(${260 + i * 2}, 100%, 60%)`;
        vctx.fillRect(x, vis.height - barHeight, barWidth - 2, barHeight);
    }
}
drawVis();

document.addEventListener("play", e => {
    if (e.target.tagName === "AUDIO") {
        setupVisualizer(e.target);
        audioCtx.resume();
    }
}, true);
</script>

</body>
</html>
