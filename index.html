<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Darkmusic – Musiques</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Darkmusic</h1>
    <p>Écoute mes sons directement ici</p>
</header>

<div id="music-list" class="music-container"></div>

<!-- CANVAS LASERS (sera animé via JS) -->
<canvas id="lasers"></canvas>

<script>
const LIST_URL = "http://darkmusic.xo.je/list.php";

fetch(LIST_URL)
    .then(r => r.json())
    .then(files => {
        const container = document.getElementById("music-list");

        files.forEach(f => {
            const card = document.createElement("div");
            card.className = "music-card";

            card.innerHTML = `
                <div class="music-title">${f}</div>
                <audio controls src="http://darkmusic.xo.je/musics/${f}"></audio>
            `;

            container.appendChild(card);
        });
    });
</script>

<!-- SCRIPT ANIMATION LASERS -->
<script>
const canvas = document.getElementById("lasers");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

let lasers = [];
for (let i = 0; i < 12; i++) {
    lasers.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        angle: Math.random() * Math.PI * 2,
        speed: 1 + Math.random() * 2,
        width: 2 + Math.random() * 3,
        color: `hsla(${260 + Math.random()*40}, 100%, 60%, 0.6)`
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    lasers.forEach(l => {
        ctx.strokeStyle = l.color;
        ctx.lineWidth = l.width;

        ctx.beginPath();
        ctx.moveTo(l.x, l.y);
        ctx.lineTo(
            l.x + Math.cos(l.angle) * 300,
            l.y + Math.sin(l.angle) * 300
        );
        ctx.stroke();

        l.x += Math.cos(l.angle) * l.speed;
        l.y += Math.sin(l.angle) * l.speed;

        if (l.x < -300 || l.x > canvas.width + 300 ||
            l.y < -300 || l.y > canvas.height + 300) {
            l.x = Math.random() * canvas.width;
            l.y = Math.random() * canvas.height;
            l.angle = Math.random() * Math.PI * 2;
        }
    });

    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
