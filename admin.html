<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Darkmusic – Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Darkmusic – Admin</h1>
    <p>Uploader une nouvelle musique</p>
</header>

<div class="upload-box">
    <input type="file" id="fileInput">
    <button onclick="upload()">Envoyer</button>
    <p id="status"></p>
</div>

<!-- CANVAS LASERS -->
<canvas id="lasers"></canvas>

<!-- CANVAS FUMÉE -->
<canvas id="smoke"></canvas>

<script>
/* ------------------ UPLOAD ------------------ */

const BACKEND_URL = "http://darkmusic.xo.je/upload.php";
const SECRET = "Darkmusic_secret";

function upload() {
    const file = document.getElementById("fileInput").files[0];
    const status = document.getElementById("status");

    if (!file) {
        status.innerText = "Choisis un fichier.";
        return;
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("secret", SECRET);

    fetch(BACKEND_URL, { method: "POST", body: formData })
        .then(r => r.text())
        .then(t => {
            status.innerText = (t === "OK")
                ? "Upload réussi !"
                : "Erreur : " + t;
        })
        .catch(() => {
            status.innerText = "Erreur de connexion.";
        });
}
</script>

<script>
/* ------------------ LASERS ------------------ */

const canvas = document.getElementById("lasers");
const ctx = canvas.getContext("2d");

function resizeLasers() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeLasers();
window.addEventListener("resize", resizeLasers);

const LASER_COUNT = 8;
const lasers = [];

function randomColor() {
    const colors = [
        "rgba(180, 0, 255, 0.7)",
        "rgba(0, 120, 255, 0.7)",
        "rgba(255, 0, 180, 0.7)",
        "rgba(0, 255, 200, 0.7)"
    ];
    return colors[Math.floor(Math.random() * colors.length)];
}

for (let i = 0; i < LASER_COUNT; i++) {
    lasers.push({
        angle: Math.random() * Math.PI * 2,
        speed: 0.005 + Math.random() * 0.01,
        width: 2 + Math.random() * 4,
        color: randomColor(),
        offset: Math.random() * 200
    });
}

function animateLasers() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    lasers.forEach(l => {
        l.angle += l.speed;

        const x1 = canvas.width / 2 + Math.cos(l.angle) * (300 + l.offset);
        const y1 = canvas.height / 2 + Math.sin(l.angle) * (300 + l.offset);

        const x2 = canvas.width / 2 - Math.cos(l.angle) * 2000;
        const y2 = canvas.height / 2 - Math.sin(l.angle) * 2000;

        ctx.strokeStyle = l.color;
        ctx.lineWidth = l.width;

        ctx.shadowBlur = 25;
        ctx.shadowColor = l.color;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
    });

    requestAnimationFrame(animateLasers);
}
animateLasers();
</script>

<script>
/* ------------------ FUMÉE ------------------ */

const smokeCanvas = document.getElementById("smoke");
const smokeCtx = smokeCanvas.getContext("2d");

function resizeSmoke() {
    smokeCanvas.width = window.innerWidth;
    smokeCanvas.height = window.innerHeight;
}
resizeSmoke();
window.addEventListener("resize", resizeSmoke);

let particles = [];
for (let i = 0; i < 40; i++) {
    particles.push({
        x: Math.random() * smokeCanvas.width,
        y: Math.random() * smokeCanvas.height,
        size: 80 + Math.random() * 120,
        speedX: -0.3 + Math.random() * 0.6,
        speedY: -0.3 + Math.random() * 0.6,
        opacity: 0.05 + Math.random() * 0.1
    });
}

function smokeLoop() {
    smokeCtx.clearRect(0, 0, smokeCanvas.width, smokeCanvas.height);

    particles.forEach(p => {
        smokeCtx.beginPath();
        smokeCtx.fillStyle = `rgba(200, 200, 255, ${p.opacity})`;
        smokeCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        smokeCtx.fill();

        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < -200) p.x = smokeCanvas.width + 200;
        if (p.x > smokeCanvas.width + 200) p.x = -200;
        if (p.y < -200) p.y = smokeCanvas.height + 200;
        if (p.y > smokeCanvas.height + 200) p.y = -200;
    });

    requestAnimationFrame(smokeLoop);
}
smokeLoop();
</script>

</body>
</html>
