<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Darkmusic – Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Darkmusic – Admin</h1>
    <p>Uploader une nouvelle musique</p>
</header>

<div class="upload-box">
    <input type="file" id="fileInput">
    <button onclick="upload()">Envoyer</button>
    <p id="status"></p>
</div>

<!-- CANVAS LASERS -->
<canvas id="lasers"></canvas>

<script>
/* ------------------ UPLOAD SYSTEM ------------------ */

const BACKEND_URL = "http://darkmusic.xo.je/upload.php";
const SECRET = "Darkmusic_secret";

function upload() {
    const file = document.getElementById("fileInput").files[0];
    const status = document.getElementById("status");

    if (!file) {
        status.innerText = "Choisis un fichier.";
        return;
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("secret", SECRET);

    fetch(BACKEND_URL, { method: "POST", body: formData })
        .then(r => r.text())
        .then(t => {
            status.innerText = (t === "OK")
                ? "Upload réussi !"
                : "Erreur : " + t;
        })
        .catch(() => {
            status.innerText = "Erreur de connexion.";
        });
}
</script>

<script>
/* ------------------ LASERS BOÎTE DE NUIT ------------------ */

const canvas = document.getElementById("lasers");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const LASER_COUNT = 8;
const lasers = [];

function randomColor() {
    const colors = [
        "rgba(180, 0, 255, 0.7)",
        "rgba(0, 120, 255, 0.7)",
        "rgba(255, 0, 180, 0.7)",
        "rgba(0, 255, 200, 0.7)"
    ];
    return colors[Math.floor(Math.random() * colors.length)];
}

for (let i = 0; i < LASER_COUNT; i++) {
    lasers.push({
        angle: Math.random() * Math.PI * 2,
        speed: 0.005 + Math.random() * 0.01,
        width: 2 + Math.random() * 4,
        color: randomColor(),
        offset: Math.random() * 200
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    lasers.forEach(l => {
        l.angle += l.speed;

        const x1 = canvas.width / 2 + Math.cos(l.angle) * (300 + l.offset);
        const y1 = canvas.height / 2 + Math.sin(l.angle) * (300 + l.offset);

        const x2 = canvas.width / 2 - Math.cos(l.angle) * 2000;
        const y2 = canvas.height / 2 - Math.sin(l.angle) * 2000;

        ctx.strokeStyle = l.color;
        ctx.lineWidth = l.width;

        ctx.shadowBlur = 25;
        ctx.shadowColor = l.color;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
    });

    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
