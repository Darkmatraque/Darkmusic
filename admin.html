<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Darkmusic – Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Darkmusic – Admin</h1>
    <p>Uploader une nouvelle musique</p>
</header>

<div class="upload-box">
    <input type="file" id="fileInput">
    <button onclick="upload()">Envoyer</button>
    <p id="status"></p>
</div>

<!-- CANVAS LASERS -->
<canvas id="lasers"></canvas>

<script>
/* ------------------ UPLOAD ------------------ */

const BACKEND_URL = "http://darkmusic.xo.je/upload.php";
const SECRET = "Darkmusic_secret";

function upload() {
    const file = document.getElementById("fileInput").files[0];
    const status = document.getElementById("status");

    if (!file) {
        status.innerText = "Choisis un fichier.";
        return;
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("secret", SECRET);

    fetch(BACKEND_URL, { method: "POST", body: formData })
        .then(r => r.text())
        .then(t => {
            status.innerText = (t === "OK")
                ? "Upload réussi !"
                : "Erreur : " + t;
        })
        .catch(() => {
            status.innerText = "Erreur de connexion.";
        });
}
</script>

<script>
const canvas = document.getElementById("lasers");
const ctx = canvas.getContext("2d");

function resizeLasers() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeLasers();
window.addEventListener("resize", resizeLasers);

// CONFIG
const LASERS_LEFT = 10;   // plus de lasers
const LASERS_RIGHT = 10;

function randomColor() {
    const colors = [
        "rgba(255, 0, 80, 0.9)",
        "rgba(0, 180, 255, 0.9)",
        "rgba(180, 0, 255, 0.9)",
        "rgba(0, 255, 160, 0.9)",
        "rgba(255, 120, 0, 0.9)"
    ];
    return colors[Math.floor(Math.random() * colors.length)];
}

function createLaser(side) {
    return {
        side,
        baseAngle: -Math.PI / 2,
        angleOffset: Math.random() * 0.8 - 0.4, // plus large
        speed: 0.003 + Math.random() * 0.008,   // plus lent
        phase: Math.random() * Math.PI * 2,
        width: 2 + Math.random() * 4,
        color: randomColor(),
        direction: Math.random() < 0.5 ? 1 : -1 // certains montent, certains descendent
    };
}

let lasers = [];

for (let i = 0; i < LASERS_LEFT; i++) lasers.push(createLaser("left"));
for (let i = 0; i < LASERS_RIGHT; i++) lasers.push(createLaser("right"));

function animateLasers() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    lasers.forEach(l => {
        // Mouvement vertical lent
        l.phase += l.speed * l.direction;

        const verticalMotion = Math.sin(l.phase) * 0.8; // amplitude plus grande

        const angle = l.baseAngle + l.angleOffset + verticalMotion;

        let xStart = (l.side === "left") ? 0 : canvas.width;
        let yStart = canvas.height;

        // Certains lasers vont jusqu’en bas
        const length = 1500 + Math.sin(l.phase * 0.5) * 800;

        const xEnd = xStart + Math.cos(angle) * length;
        const yEnd = yStart + Math.sin(angle) * length;

        ctx.strokeStyle = l.color;
        ctx.lineWidth = l.width;

        ctx.shadowBlur = 40;
        ctx.shadowColor = l.color;

        ctx.beginPath();
        ctx.moveTo(xStart, yStart);
        ctx.lineTo(xEnd, yEnd);
        ctx.stroke();
    });

    requestAnimationFrame(animateLasers);
}
animateLasers();
</script>
